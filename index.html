// Modal functions
function openBookingModal() {
  document.getElementById('booking-modal').classList.remove('hidden');
}

function closeBookingModal() {
  document.getElementById('booking-modal').classList.add('hidden');
}

// Close modals on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeBookingModal();
  }
});

// Close modals on background click
document.getElementById('booking-modal').addEventListener('click', (e) => {
  if (e.target.id === 'booking-modal') closeBookingModal();
});

// Data SDK
let bookings = [];
let recordCount = 0;

const dataHandler = {
  onDataChanged(data) {
    bookings = data;
    recordCount = data.length;
  }
};

(async () => {
  const r = await window.dataSdk.init(dataHandler);
  if (!r.isOk) console.error("Data SDK init failed");
})();

// Booking form
document.getElementById('booking-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (recordCount >= 999) {
    alert('Límite de reservas alcanzado');
    return;
  }
  
  const btn = e.target.querySelector('button[type="submit"]');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i data-lucide="loader" style="width: 18px; height: 18px; display: inline; margin-right: 8px; animation: spin 1s linear infinite;"></i>Reservando...';

  const result = await window.dataSdk.create({
    client_name: document.getElementById('client-name').value,
    phone: document.getElementById('client-phone').value,
    service: document.getElementById('client-service').value,
    date: document.getElementById('client-date').value,
    time: document.getElementById('client-time').value,
    created_at: new Date().toISOString()
  });

  btn.disabled = false;
  btn.innerHTML = originalText;

  if (result.isOk) {
    document.getElementById('booking-form').classList.add('hidden');
    document.getElementById('booking-success').classList.remove('hidden');
    setTimeout(() => {
      document.getElementById('booking-form').classList.remove('hidden');
      document.getElementById('booking-form').reset();
      document.getElementById('booking-success').classList.add('hidden');
      closeBookingModal();
    }, 3000);
  }
});

// Element SDK
const defaultConfig = {
  salon_name: "BELLA HAIR",
  salon_tagline: "LUJO Y ELEGANCIA",
  salon_instagram: "@bellahairstudio",
  salon_phone: "+34612345678"
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const name = config.salon_name || defaultConfig.salon_name;
    const tagline = config.salon_tagline || defaultConfig.salon_tagline;
    const instagram = config.salon_instagram || defaultConfig.salon_instagram;
    const phone = config.salon_phone || defaultConfig.salon_phone;

    document.getElementById('salon-title').textContent = name;
    document.getElementById('salon-tagline').textContent = tagline;
    
    // Update Instagram link
    const instagramLink = document.querySelector('a[href*="instagram.com"]');
    if (instagram && instagram.startsWith('@')) {
      instagramLink.href = `https://instagram.com/${instagram.substring(1)}`;
    }

    // Update WhatsApp link
    if (phone) {
      const phoneNumber = phone.replace(/\D/g, '');
      document.getElementById('whatsapp-link').href = `https://wa.me/${phoneNumber}?text=Hola, me gustaría agendar una cita en ${name}`;
    }

    document.getElementById('contact-info').textContent = `📍 Madrid • ${instagram}`;
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { 
        get: () => '#d4af37',
        set: (v) => {
          // Accent color is fixed for luxury aesthetic
          window.elementSdk.setConfig({});
        }
      }
    ],
    borderables: [],
    fontEditable: undefined,
    fontSizeable: undefined
  }),
  mapToEditPanelValues: (config) => new Map([
    ["salon_name", config.salon_name || defaultConfig.salon_name],
    ["salon_tagline", config.salon_tagline || defaultConfig.salon_tagline],
    ["salon_instagram", config.salon_instagram || defaultConfig.salon_instagram],
    ["salon_phone", config.salon_phone || defaultConfig.salon_phone]
  ])
});
